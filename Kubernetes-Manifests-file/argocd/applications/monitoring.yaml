apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring-voting-app
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/HoussemDhahri/Voting-app-End-to-End-Project.git
    targetRevision: main
    path: Kubernetes-Manifests-file/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true