apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-deployment
  labels:
    app: voting-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: voting-app

  template:
    metadata:
      labels:
        app: voting-app

    spec:
      containers:
        - name: vote-container
          image: houssemdhahri93/voting-vote
          imagePullPolicy: Always
          
          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: vote-config

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"