apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-statefulset
  labels:
    app: redis-app

spec:
  serviceName: redis
  replicas: 1

  selector:
    matchLabels:
      app: redis-app

  template:
    metadata:
      labels:
        app: redis-app

    spec:
      containers:
        - name: redis-container
          image: redis:alpine
          imagePullPolicy: Always

          args:
            - "--appendonly"
            - "yes"

          volumeMounts:
            - name: redis-data
              mountPath: /data
          
          ports:
            - containerPort: 6379

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
