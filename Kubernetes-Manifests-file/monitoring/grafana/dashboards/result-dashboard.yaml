apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-result
  namespace: monitoring
  labels:
    grafana_dashboard: "1"

data:
  result-dashboard.json: |
    {
      "uid": "voting-result",
      "title": "Voting App - Result Service",
      "description": "Traffic, latency, errors and pod resource usage for the Result service.",
      "tags": ["voting-app", "result"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "graphTooltip": 1,
      "style": "dark",
      "time": { "from": "now-6h", "to": "now" },

      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "title": "Voting App Dashboards",
          "type": "dashboards",
          "tags": ["voting-app"]
        }
      ],

      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "definition": "label_values(up, namespace)",
            "query": "label_values(up, namespace)",
            "refresh": 2,
            "multi": false,
            "includeAll": false,
            "current": {}
          }
        ]
      },

      "panels": [
        { "id": 100, "type": "row", "title": "Traffic & Errors", "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }, "collapsed": false },

        {
          "id": 1,
          "title": "Result Requests / sec",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [ { "expr": "rate(result_requests_total[5m])", "legendFormat": "requests" } ],
          "gridPos": { "x": 0, "y": 1, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15 } } },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        },

        {
          "id": 2,
          "title": "Result Errors / sec",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [ { "expr": "rate(result_errors_total[5m])", "legendFormat": "errors" } ],
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps", "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20 },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        },

        { "id": 101, "type": "row", "title": "Database Latency", "gridPos": { "x": 0, "y": 9, "w": 24, "h": 1 }, "collapsed": false },

        {
          "id": 3,
          "title": "PostgreSQL Query Latency",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [ { "expr": "rate(result_query_duration_seconds_sum[5m]) / rate(result_query_duration_seconds_count[5m])", "legendFormat": "query latency" } ],
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s", "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15 },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 0.2 }, { "color": "red", "value": 0.5 } ] }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        },

        { "id": 102, "type": "row", "title": "Pod Resources", "gridPos": { "x": 0, "y": 18, "w": 24, "h": 1 }, "collapsed": false },

        {
          "id": 4,
          "title": "Result Pod CPU Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [ { "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\",pod=~\"result-deployment.*\"}[5m])) by (pod)", "legendFormat": "{{pod}}" } ],
          "gridPos": { "x": 0, "y": 19, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 } } },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } }
        },

        {
          "id": 5,
          "title": "Result Pod Memory Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [ { "expr": "container_memory_working_set_bytes{namespace=\"$namespace\",pod=~\"result-deployment.*\"}", "legendFormat": "{{pod}}" } ],
          "fieldConfig": { "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 } } },
          "gridPos": { "x": 12, "y": 19, "w": 12, "h": 8 },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } }
        },

        {
          "id": 6,
          "title": "Result Pod Restarts",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [ { "expr": "kube_pod_container_status_restarts_total{namespace=\"$namespace\",pod=~\"result-deployment.*\"}", "legendFormat": "{{pod}}" } ],
          "gridPos": { "x": 0, "y": 27, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "short", "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "bars", "fillOpacity": 60 },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] }
            }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } }
        }
      ]
    }