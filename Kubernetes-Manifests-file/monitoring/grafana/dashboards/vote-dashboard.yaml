apiVersion: v1
kind: ConfigMap

metadata:
  name: grafana-dashboard-vote
  labels:
    grafana_dashboard: "1"

data:
  vote-dashboard.json: |
    {
      "title": "Voting App - Vote Service",
      "tags": ["voting-app", "vote"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",

      "time": {
        "from": "now-6h",
        "to": "now"
      },

      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {}
          },

          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "definition": "label_values(up, namespace)",
            "query": "label_values(up, namespace)",
            "refresh": 1,
            "current": {}
          }
        ]
      },

      "panels": [

        {
          "id": 1,
          "title": "Vote Requests / sec",
          "type": "timeseries",

          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },

          "targets": [
            {
              "expr": "rate(vote_requests_total[5m])",
              "legendFormat": "requests"
            }
          ],

          "gridPos": {
            "x":0,
            "y":0,
            "w":12,
            "h":8
          }
        },


        {
          "id": 2,
          "title": "Votes by Option",
          "type": "timeseries",

          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },

          "targets": [
            {
              "expr": "sum(votes_total) by(option)",
              "legendFormat": "{{option}}"
            }
          ],

          "gridPos": {
            "x":12,
            "y":0,
            "w":12,
            "h":8
          }
        },


        {
          "id": 3,
          "title": "Vote Errors / sec",
          "type": "timeseries",

          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },

          "targets": [
            {
              "expr": "rate(vote_errors_total[5m])",
              "legendFormat": "errors"
            }
          ],

          "gridPos": {
            "x":0,
            "y":8,
            "w":12,
            "h":8
          }
        },


        {
          "id": 4,
          "title": "Vote Request Duration",

          "type": "timeseries",

          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },

          "targets": [
            {
              "expr": "rate(vote_request_duration_seconds_sum[5m]) / rate(vote_request_duration_seconds_count[5m])",
              "legendFormat": "latency"
            }
          ],

          "gridPos": {
            "x":12,
            "y":8,
            "w":12,
            "h":8
          }
        },


        {
          "id": 5,
          "title": "Vote Pod CPU Usage",

          "type": "timeseries",

          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },

          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\",pod=~\"vote-deployment.*\"}[5m])) by(pod)",
              "legendFormat": "{{pod}}"
            }
          ],

          "gridPos": {
            "x":0,
            "y":16,
            "w":12,
            "h":8
          }
        },


        {
          "id": 6,
          "title": "Vote Pod Memory",

          "type": "timeseries",

          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },

          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"$namespace\",pod=~\"vote-deployment.*\"}",
              "legendFormat": "{{pod}}"
            }
          ],

          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },

          "gridPos": {
            "x":12,
            "y":16,
            "w":12,
            "h":8
          }
        }

      ]
    }